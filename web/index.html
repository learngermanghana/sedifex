<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4338CA" />
    <title>Sedifex — Inventory & POS</title>

    <!-- Paystack Inline (needed for card/mobile checkout) -->
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <!-- Google tag (gtag.js) -->
    <script>
      (function () {
        const tagId = '%VITE_GOOGLE_TAG_ID%'
        if (!tagId || tagId.includes('%VITE_GOOGLE_TAG_ID%')) return

        const script = document.createElement('script')
        script.async = true
        script.src = `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(tagId)}`
        document.head.appendChild(script)

        window.dataLayer = window.dataLayer || []
        function gtag() {
          window.dataLayer.push(arguments)
        }

        gtag('js', new Date())
        gtag('config', tagId)
        window.gtag = gtag
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="recaptcha-container"></div>

    <!-- Your app entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
