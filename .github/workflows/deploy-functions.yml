name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'
      - '.github/scripts/deploy-functions-with-retry.sh'

concurrency:
  group: firebase-functions-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: |
          cat > "$HOME/gcp-key.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEDIFEX }}
          EOF

      - name: Validate service account key
        run: |
          node -e "const fs=require('fs'); const key=JSON.parse(fs.readFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS || process.env.HOME + '/gcp-key.json', 'utf8')); if(!key.client_email || !key.private_key || !key.project_id){ throw new Error('Invalid service account JSON'); } console.log('Using service account:', key.client_email);"

      - name: Set Google credentials
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=sedifex-web" >> "$GITHUB_ENV"
          echo "GCLOUD_PROJECT=sedifex-web" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=sedifex-web" >> "$GITHUB_ENV"

      - name: Activate Google service account
        run: |
          gcloud auth activate-service-account --key-file="$HOME/gcp-key.json"
          gcloud config set project sedifex-web
          gcloud auth list

      - name: Verify Firebase auth
        run: firebase projects:list --json

      - name: Write Functions env file
        run: |
          cat <<'EOF' > functions/.env.sedifex-web
          ${{ secrets.FUNCTIONS_ENV_SEDIFEX_WEB }}
          EOF

      - name: Delete removed legacy functions
        run: firebase functions:delete exportDailyStoreReports --region us-central1 --project sedifex-web --force || true

      - name: Build and list functions to deploy
        run: |
          npm --prefix functions run build
          FUNCTIONS_LIST=$(node -e "const exportsMap = require('./functions/lib/index.js'); const deployable = Object.entries(exportsMap).filter(([name, value]) => !name.startsWith('__') && value && typeof value === 'function' && (value.__endpoint || value.__trigger)).map(([name]) => name); process.stdout.write(deployable.join(','));")
          if [ -z "$FUNCTIONS_LIST" ]; then
            echo "No deployable function exports found in functions/lib/index.js"
            exit 1
          fi
          echo "FUNCTIONS_ONLY=$(printf '%s' "$FUNCTIONS_LIST" | sed 's/[^,]*/functions:&/g')" >> "$GITHUB_ENV"

      - name: Deploy Firebase Functions
        run: .github/scripts/deploy-functions-with-retry.sh
