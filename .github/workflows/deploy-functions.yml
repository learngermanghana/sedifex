name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'

concurrency:
  group: firebase-functions-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEDIFEX }}' > $HOME/gcp-key.json

      - name: Set Google credentials
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json" >> $GITHUB_ENV

      - name: Write Functions env file
        run: |
          cat <<'EOF' > functions/.env.sedifex-web
          ${{ secrets.FUNCTIONS_ENV_SEDIFEX_WEB }}
          EOF

      - name: Delete removed legacy functions
        run: firebase functions:delete exportDailyStoreReports --region us-central1 --project sedifex-web --force || true

      - name: Build and list functions to deploy
        run: |
          npm --prefix functions run build
          FUNCTIONS_LIST=$(node -e "const exportsMap = require('./functions/lib/index.js'); const deployable = Object.keys(exportsMap).filter((name) => !name.startsWith('__')); process.stdout.write(deployable.join(','));")
          if [ -z "$FUNCTIONS_LIST" ]; then
            echo "No deployable function exports found in functions/lib/index.js"
            exit 1
          fi
          echo "FUNCTIONS_ONLY=$(printf '%s' "$FUNCTIONS_LIST" | sed 's/[^,]*/functions:&/g')" >> "$GITHUB_ENV"

      - name: Deploy Firebase Functions
        run: firebase deploy --only "$FUNCTIONS_ONLY" --project sedifex-web --force
