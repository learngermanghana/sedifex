name: Validate Firebase Functions PR

on:
  pull_request:
    paths:
      - 'functions/**'
      - '.github/workflows/validate-functions-pr.yml'

permissions:
  contents: read

jobs:
  build-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build Firebase Functions
        working-directory: functions
        run: npm run build
